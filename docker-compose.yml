services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # anonymous volume keeps container-installed node_modules from being
      # shadowed by the host directory
      - /app/node_modules
      - ./data:/data
    environment:
      DATABASE_PATH: /data/locus.db
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
