services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: locus
      POSTGRES_PASSWORD: locus
      POSTGRES_DB: locus
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locus"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: install dependencies into the shared node_modules volume.
  # `migrate` and `app` both wait for this to complete so they don't race
  # on package install.
  install:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: ["pnpm", "install"]
    restart: "no"

  # One-shot: mirrors the Helm pre-upgrade Job — applies pending migrations
  # and exits.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      install:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://locus:locus@db:5432/locus
    command: ["pnpm", "db:migrate"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      install:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://locus:locus@db:5432/locus
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

volumes:
  db-data:
  node_modules:
